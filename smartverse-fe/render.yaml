services:
  - type: web
    name: laravel-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_NAME
        value: MyApp
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false             # isi dengan URL Render kamu setelah deploy
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false             # dari Supabase
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        sync: false             # dari Supabase
      - key: DB_USERNAME
        sync: false             # dari Supabase
      - key: DB_PASSWORD
        sync: false             # dari Supabase
      - key: PYTHON_BACKEND_URL
        sync: false             # URL ngrok kamu